name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "26.0 (Tahoe)"
    validations:
      required: true
  - type: input
    id: openrowdb-version
    attributes:
      label: OpenrowDB version
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: db
    attributes:
      label: Database (type + version)
      placeholder: "PostgreSQL 16.2"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
