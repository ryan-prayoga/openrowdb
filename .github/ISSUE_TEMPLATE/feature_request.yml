name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain point, not the solution yet.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Roadmap fit
      options:
        - "Phase 1 — Connect"
        - "Phase 2 — Browse"
        - "Phase 3 — Query"
        - "Phase 4 — Polish"
        - "Post v1"
        - "Unsure"
    validations:
      required: true
