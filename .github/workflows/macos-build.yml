name: macOS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/mac/**'
      - '.github/workflows/macos-build.yml'
  pull_request:
    paths:
      - 'apps/mac/**'
      - '.github/workflows/macos-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test Core (SwiftPM)
    # macOS 26 (Tahoe) runner: the app targets .macOS(.v26) and uses Liquid Glass
    # APIs + swift-tools 6.2, which require Xcode 26 / Swift 6.2+.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$XCODE" ]; then
            echo "Selecting $XCODE"
            sudo xcode-select -s "$XCODE/Contents/Developer"
          else
            echo "No Xcode_26* found; using default: $(xcode-select -p)"
          fi

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        working-directory: apps/mac
        run: swift package resolve

      - name: Build
        working-directory: apps/mac
        run: swift build -c debug

      - name: Test
        working-directory: apps/mac
        run: swift test --parallel
